name: Python Flask CI

# Trigger CI on pushes or pull requests to main (you can add other branches too)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run tests
      run: |
        # Run your test suite here (pytest or unittest)
        # If you don't have tests yet, you can skip or create basic ones
        pytest -q || echo "No tests or tests failed"

    - name: Lint code (optional)
      run: |
        pip install flake8
        flake8 .

    - name: Report results
      run: echo "CI completed"
